<!-- Stats Cards -->
<div class="row mb-4">
    <!-- Total Tools -->
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card stat-card stat-card-blue h-100">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="stat-number">{{ total_tools|default:"0" }}</div>
                        <div class="stat-label">Total Tools</div>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-tools stat-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Active Bookings -->
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card stat-card stat-card-green h-100">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="stat-number">{{ active_bookings|default:"0" }}</div>
                        <div class="stat-label">Active Bookings</div>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-calendar-check stat-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- This Month Earnings -->
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card stat-card stat-card-yellow h-100">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="stat-number">Rs {{ month_earnings|floatformat:2 }}</div>
                        <div class="stat-label">This Month</div>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-rupee-sign stat-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Average Rating -->
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card stat-card stat-card-cyan h-100">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="stat-number">{{ avg_rating|default:"0" }}</div>
                        <div class="stat-label">Avg Rating</div>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-star stat-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
