<!-- Header -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <i class="fas fa-seedling me-2"></i>
            <strong>Kishan Hub</strong>
        </a>

        <!-- Logout Button (hidden by default) -->
<div id="dashboardLogout" style="display: none;" class="mt-3 text-end px-3">
  <form method="post" action="{% url 'farmer-logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">
          <i class="fas fa-sign-out-alt me-2"></i> Logout
      </button>
  </form>
</div>

    </div>
</nav>

<script>
  document.addEventListener("DOMContentLoaded", function () {
      const logoutButton = document.getElementById("dashboardLogout");

      document.querySelectorAll('.nav-link[data-section]').forEach(link => {
          link.addEventListener("click", function (e) {
              const section = this.getAttribute("data-section");

              if (section === "dashboard") {
                  logoutButton.style.display = "block";
              } else {
                  logoutButton.style.display = "none";
              }
          });
      });

      // Optional: Show logout button if landing directly on Dashboard
      if (window.location.pathname === "{% url 'seller-dashboard' %}") {
          logoutButton.style.display = "block";
      }
  });
</script>
