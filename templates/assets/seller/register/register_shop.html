{% extends 'assets/seller/seller_dashboard_base.html' %}
{% load static %}

{% block content %}
<style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background-color: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }

    section {
      margin-bottom: 30px;
    }

    section h3 {
      color: #2c3e50;
      border-bottom: 2px solid #e1e4e8;
      padding-bottom: 5px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #444;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s ease;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #007bff;
      outline: none;
    }

    textarea {
      resize: vertical;
    }

    .button-group {
      display: flex;
      gap: 10px;
    }

    .button-group button,
    .button-group a {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      text-align: center;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    .button-group button {
      background-color: #28a745;
      color: white;
      cursor: pointer;
    }

    .button-group button:hover {
      background-color: #218838;
    }

    .button-group a {
      background-color: #dc3545;
      color: white;
    }

    .button-group a:hover {
      background-color: #c82333;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 22px;
      }

      section h3 {
        font-size: 18px;
      }
    }
  </style>
<div class="container">
  <h1>Seller Registration</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="button-group">
      <button type="submit">Register My Shop</button>
      <a href="{% url 'seller-dashboard' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
