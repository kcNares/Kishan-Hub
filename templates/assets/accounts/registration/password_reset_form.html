{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #f5f6fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* Card */

.reset-card{
    width: 380px;
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-align:center;
}

/* Title */

.reset-card h2{
    margin-bottom:10px;
    color:#2E7D32;
}

/* Subtitle */

.reset-card p{
    font-size:14px;
    color:#666;
    margin-bottom:25px;
}

/* Form */

.form-group{
    text-align:left;
    margin-bottom:20px;
}

.form-group label{
    font-weight:600;
    font-size:14px;
}

.form-group input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-top:6px;
    font-size:14px;
}

.form-group input:focus{
    outline:none;
    border-color:#4CAF50;
}

/* Button */

.btn-reset{
    width:100%;
    padding:12px;
    border:none;
    background:#4CAF50;
    color:white;
    font-size:15px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

.btn-reset:hover{
    background:#2E7D32;
}

/* Back link */

.back-link{
    margin-top:18px;
    font-size:14px;
}

.back-link a{
    color:#4CAF50;
    text-decoration:none;
    font-weight:600;
}

.error{
    color:red;
    font-size:13px;
    text-align:left;
}

</style>
</head>

<body>

<div class="reset-card">

<h2>Forgot Password?</h2>

<p>Enter your registered email and we will send you a password reset link.</p>

<form method="post">
{% csrf_token %}

{% if form.errors %}
<div class="error">
    {{ form.errors }}
</div>
{% endif %}

<div class="form-group">
<label>Email Address</label>
<input type="email" name="email" required placeholder="Enter your email">
</div>

<button class="btn-reset" type="submit">
Send Reset Link
</button>

</form>

<div class="back-link">

{% if request.GET.role == "seller" %}
<a href="{% url 'seller-login' %}">← Back to Login</a>

{% else %}
<a href="{% url 'farmer-login' %}">← Back to Login</a>
{% endif %}

</div>

</div>

</body>
</html>
