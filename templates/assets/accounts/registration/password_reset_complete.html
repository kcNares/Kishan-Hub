<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Changed</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f6fa;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.card{
    width:380px;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 2px 20px rgba(0,0,0,0.08);
    text-align:center;
}

.icon{
    font-size:50px;
    margin-bottom:15px;
}

h2{
    color:#2E7D32;
    margin-bottom:12px;
}

p{
    font-size:14px;
    color:#555;
    line-height:1.6;
}

a{
    display:inline-block;
    margin-top:22px;
    text-decoration:none;
    color:#4CAF50;
    font-weight:600;
}

</style>
</head>

<body>

<div class="card">

<div class="icon">✅</div>

<h2>Password Changed</h2>

<p>
Your password has been successfully updated.
You can now login using your new password.
</p>

{% if request.GET.role == "seller" %}
<a href="{% url 'seller-login' %}">Login</a>

{% else %}
<a href="{% url 'farmer-login' %}">Login</a>
{% endif %}

</div>

</body>
</html>
