<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set New Password</title>

<style>
:root {
    --primary: #1f2937;
    --accent: #2563eb;
    --border: #e5e7eb;
    --text-muted: #6b7280;
    --bg: #f9fafb;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Inter", "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.card {
    width: 420px;
    background: #ffffff;
    padding: 40px;
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

/* Heading */
.card h2 {
    margin: 0 0 6px;
    font-size: 22px;
    color: var(--primary);
    text-align: center;
}

/* Subtitle */
.card p {
    margin: 0 0 28px;
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
}

/* Form group */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-size: 13px;
    color: var(--primary);
    margin-bottom: 6px;
}

/* Input wrapper */
.input-wrapper {
    position: relative;
}

.input-wrapper input {
    width: 100%;
    padding: 12px 42px 12px 12px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.input-wrapper input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

/* Eye button */
.eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 15px;
    color: var(--text-muted);
    user-select: none;
}

/* Errors */
.errorlist {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    padding: 10px 12px;
    font-size: 13px;
    border-radius: 8px;
    margin-bottom: 18px;
}

/* Button */
.btn-submit {
    width: 100%;
    padding: 13px;
    font-size: 15px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    cursor: pointer;
    transition: background 0.2s, transform 0.05s;
}

.btn-submit:hover {
    background: #1d4ed8;
}

.btn-submit:active {
    transform: translateY(1px);
}

/* Footer hint */
.hint {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
}
</style>
</head>

<body>

<div class="card">
    <h2>Set new password</h2>
    <p>Your new password must be different from previous ones.</p>

    <form method="post">
        {% csrf_token %}

        {% if form.errors %}
        <div class="errorlist">
            {{ form.errors }}
        </div>
        {% endif %}

        <div class="form-group">
            <label for="id_new_password1">New password</label>
            <div class="input-wrapper">
                {{ form.new_password1 }}
                <span class="eye-btn" onclick="togglePassword('id_new_password1')">👁</span>
            </div>
        </div>

        <div class="form-group">
            <label for="id_new_password2">Confirm new password</label>
            <div class="input-wrapper">
                {{ form.new_password2 }}
                <span class="eye-btn" onclick="togglePassword('id_new_password2')">👁</span>
            </div>
        </div>

        <button type="submit" class="btn-submit">
            Update password
        </button>

        <div class="hint">
            Make sure your password is at least 8 characters long.
        </div>
    </form>
</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
