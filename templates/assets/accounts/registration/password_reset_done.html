<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Reset Sent</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f6fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:white;
    padding:40px;
    width:400px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
    text-align:center;
}

.icon{
    font-size:50px;
    margin-bottom:20px;
}

h2{
    color:#2E7D32;
    margin-bottom:12px;
}

p{
    color:#555;
    font-size:14px;
    line-height:1.6;
}

.back-link{
    margin-top:25px;
}

.back-link a{
    text-decoration:none;
    color:#4CAF50;
    font-weight:600;
}

</style>
</head>

<body>

<div class="card">

<div class="icon">📧</div>

<h2>Check Your Email</h2>

<p>
If an account exists with the email you entered,
we have sent a password reset link.
Please check your inbox and spam folder.
</p>

<div class="back-link">

{% if request.GET.role == "seller" %}
<a href="{% url 'password_reset' %}?role=seller">
← Back to Password Reset
</a>

{% else %}
<a href="{% url 'password_reset' %}?role=farmer">
← Back to Password Reset
</a>

{% endif %}

</div>

</div>

</body>
</html>
